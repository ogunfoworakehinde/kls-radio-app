name: Build Android APK and AAB (Capacitor)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Build web assets (if any)
      run: echo "No web build step"

    - name: Copy web assets and sync Capacitor
      run: npx cap copy android

    - name: Decode keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > klsradio-release.keystore

    - name: Build debug APK
      working-directory: android
      run: ./gradlew assembleDebug

    - name: Build release AAB
      working-directory: android
      run: |
        ./gradlew bundleRelease \
          -Pandroid.injected.signing.store.file=../klsradio-release.keystore \
          -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
          -Pandroid.injected.signing.key.alias=klsradio \
          -Pandroid.injected.signing.key.password=$KEY_PASSWORD
      continue-on-error: true

    - name: Upload debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload release AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-release.aab
        path: android/app/build/outputs/bundle/release/app-release.aab
      continue-on-error: true
