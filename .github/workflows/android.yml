name: Build Android APK and AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - uses: actions/setup-node@v4
      with:
        node-version: '18'

    - run: npm install -g cordova@12.0.0

    - run: npm install

    - run: cordova platform rm android --nosave || true

    - run: cordova platform add android@13.0.0 --save

    - run: |
        cordova plugin add cordova-plugin-network-information
        cordova plugin add cordova-plugin-statusbar
        cordova plugin add cordova-plugin-media@5.0.3
        cordova plugin add cordova-plugin-background-mode
        cordova plugin add cordova-plugin-music-controls2@3.0.7
        cordova plugin add cordova-plugin-android-permissions

    - run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > klsradio-release.keystore

    - run: cordova build android --release -- --packageType=bundle --buildConfig build.json

    - run: cordova build android --debug

    - uses: actions/upload-artifact@v4
      with:
        name: kls-radio-release-aab
        path: platforms/android/app/build/outputs/bundle/release/*.aab

    - uses: actions/upload-artifact@v4
      with:
        name: kls-radio-debug-apk
        path: platforms/android/app/build/outputs/apk/debug/*.apk
