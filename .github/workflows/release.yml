name: Build Release (Google Play)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Strip PNG metadata (fix AAPT2 errors)
        run: |
          sudo apt-get install -y imagemagick
          find app/src/main/res -name "*.png" -exec mogrify -strip {} \;

      - name: Decode and convert keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -e
          echo "$KEYSTORE_BASE64" | base64 --decode > temp.keystore

          # Try to detect the keystore type
          STORETYPE="PKCS12"
          if keytool -list -keystore temp.keystore -storepass "$KEYSTORE_PASSWORD" -storetype PKCS12 &>/dev/null; then
            STORETYPE="PKCS12"
          elif keytool -list -keystore temp.keystore -storepass "$KEYSTORE_PASSWORD" -storetype JCEKS &>/dev/null; then
            STORETYPE="JCEKS"
          else
            STORETYPE="JKS"
          fi
          echo "Detected keystore type: $STORETYPE"

          # Convert to JKS using the correct alias from secret
          keytool -importkeystore \
            -srckeystore temp.keystore \
            -srcstorepass "$KEYSTORE_PASSWORD" \
            -srckeypass "$KEY_PASSWORD" \
            -srcstoretype "$STORETYPE" \
            -srcalias "$KEY_ALIAS" \
            -destkeystore app/klsradio-release.jks \
            -deststorepass "$KEYSTORE_PASSWORD" \
            -destkeypass "$KEY_PASSWORD" \
            -deststoretype JKS \
            -destalias "$KEY_ALIAS" \
            -noprompt

      - name: Build release APK
        run: gradle assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Build release AAB
        run: gradle bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: klsradio-release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: klsradio-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
